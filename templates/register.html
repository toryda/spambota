
{% extends "base.html" %}
{% block content %}
<div style="margin-bottom: 20px;">
    <a href="/auth/login" class="btn btn-secondary" style="margin-right: 10px; text-decoration: none;">
        ← Назад к входу
    </a>
</div>

<div class="header">
    <h1>📝 Регистрация</h1>
    <p class="subtitle">Создание нового аккаунта</p>
</div>

<div class="content">
    <div class="page-title">➕ Новый пользователь</div>
    
    {% if error %}
    <div style="background: #f8d7da; color: #721c24; padding: 12px; border-radius: 8px; margin-bottom: 20px;">
        {{ error }}
    </div>
    {% endif %}
    
    <form method="post" action="/auth/register">
        <div class="form-group">
            <label class="form-label">Логин</label>
            <input type="text" name="username" class="form-input" placeholder="admin" required>
        </div>

        <div class="form-group">
            <label class="form-label">Пароль</label>
            <input type="password" name="password" class="form-input" placeholder="••••••••" required>
        </div>

        <div class="form-group">
            <label class="form-label">Подтверждение пароля</label>
            <input type="password" name="confirm_password" class="form-input" placeholder="••••••••" required>
        </div>
        
        <button type="submit" class="btn">Зарегистрироваться</button>
        
        <a href="/auth/login" class="btn btn-secondary" style="margin-top: 10px; text-align: center; display: block; text-decoration: none;">
            Уже есть аккаунт? Войти
        </a>
    </form>
</div>
{% endblock %}
